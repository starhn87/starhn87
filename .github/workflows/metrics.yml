name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: starhn87
          template: classic
          base: repositories
          base_indepth: yes
          repositories_forks: yes
          plugin_languages: no
          plugin_activity: no
          plugin_followup: no
          plugin_people: no
          config_timezone: Asia/Seoul
